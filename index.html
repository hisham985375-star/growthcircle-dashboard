<title>GrowthCircle – Community Dashboard</title>
<meta name="description" content="GrowthCircle Community Dashboard – track member scores, attendance, engagement and growth."/>
<!-- SUPABASE CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap');
:root{
  --bg:#0b0f19;
  --card:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --text:#f3f4f6;
  --sub:#9ca3af;
  --mute:#6b7280;
  --accent:#6366f1;
  --accent-h:#4f46e5;
  --accent-l:rgba(99,102,241,0.15);
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --sw:240px;--hh:60px;--rc:18px;--rm:20px;
  --sc:0 4px 30px rgba(0,0,0,0.4);
  --sm:0 24px 72px rgba(0,0,0,0.6);
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-h:'Outfit', sans-serif;
  --ease:200ms cubic-bezier(0.4, 0, 0.2, 1);
  --glass: backdrop-filter: blur(16px);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden;}
button{cursor:pointer;font-family:var(--font);border:none;background:none;color:inherit;outline:none;}
input,select,textarea{font-family:var(--font);color:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px;}

/* ─── LOADING ─── */
#loading-screen{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(circle at top,#111827,#030712);z-index:9999;
  transition:opacity .5s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.ld-logo{font-family:var(--font-h);font-size:36px;font-weight:800;color:#fff;margin-bottom:10px;letter-spacing:-1.5px;display:flex;align-items:center;gap:10px;}
.ld-sub{color:var(--sub);font-size:14px;margin-bottom:36px;}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SETUP CREDENTIALS SCREEN ─── */
.setup-overlay{position:fixed;inset:0;background:radial-gradient(circle at center,#1e1b4b,#030712);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.setup-card{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:440px;box-shadow:var(--sm);margin:auto;text-align:center;}

/* ─── LOGIN ─── */
#login-screen{
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:radial-gradient(circle at center,#111827,#030712);
  padding:20px;position:relative;overflow:hidden;
}
.login-card{
  background:rgba(255,255,255,0.03);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border);border-radius:28px;
  padding:44px 40px;width:100%;max-width:420px;
  box-shadow:var(--sm);z-index:2;
}
.login-logo{font-family:var(--font-h);font-size:28px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:-1px;}
.login-sub{text-align:center;color:var(--sub);font-size:14px;margin-bottom:26px;}
.tab-bar{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:22px;gap:3px;}
.tab-btn{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:600;color:var(--sub);transition:all var(--ease);text-align:center;}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,0.25);}
.field-wrap{position:relative;margin-bottom:14px;}
.field-wrap label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.field-wrap input{width:100%;padding:12px 44px 12px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;outline:none;transition:border-color var(--ease);}
.field-wrap input:focus{border-color:var(--accent);background:rgba(255,255,255,0.08);}
.field-wrap input::placeholder{color:rgba(255,255,255,0.2);}
.eye-btn{position:absolute;right:13px;bottom:12px;background:none;border:none;color:var(--sub);font-size:16px;line-height:1;padding:0;transition:color var(--ease);}
.eye-btn:hover{color:#fff;}
.forgot-link{display:block;text-align:right;font-size:12.5px;color:var(--accent);text-decoration:none;margin-top:-6px;margin-bottom:18px;font-weight:500;}
.forgot-link:hover{text-decoration:underline;}
.login-btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;font-size:15px;font-weight:700;margin-top:6px;transition:opacity var(--ease),transform var(--ease);letter-spacing:.2px;box-shadow:0 4px 15px rgba(99,102,241,0.3);}
.login-btn:hover{opacity:.95;transform:translateY(-1px);}
.login-btn:active{transform:translateY(0);}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0;}
.divider span{color:var(--mute);font-size:12px;text-transform:uppercase;letter-spacing:.5px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.google-btn{
  width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);
  background:rgba(255,255,255,0.03);color:#fff;font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all var(--ease);
}
.google-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);}
.google-icon{width:18px;height:18px;flex-shrink:0;}
.login-err{color:#f87171;font-size:13px;text-align:center;margin-top:12px;min-height:18px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease;}

/* ─── LOGIN LAYOUT / CHARACTER ─── */
.login-layout{display:flex;align-items:center;justify-content:center;gap:0;}
.login-character{
  position:relative;width:140px;flex-shrink:0;margin-left:-20px;z-index:1;
  animation:charSlideIn .9s cubic-bezier(.25,.46,.45,.94) both;
  animation-delay:.3s;opacity:0;
}
@keyframes charSlideIn{from{opacity:0;transform:translateX(60px) rotate(5deg);}to{opacity:1;transform:translateX(0) rotate(0deg);}}
.char-svg{width:140px;height:320px;}
.char-body-group{animation:charBob 3s ease-in-out infinite;transform-origin:bottom center;}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.char-push-arm{animation:charPush 2s ease-in-out infinite;transform-origin:right center;}
@keyframes charPush{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-3deg)}}
.char-pupil{transition:transform .3s ease;}
.login-character.peek .char-pupil{transform:translate(-3px,2px);}
.login-character.peek-up .char-pupil{transform:translate(-2px,-2px);}
@media(max-width:900px){.login-character{display:none;}.login-layout{display:block;}}

/* ─── ACCESS CODE OVERLAY ─── */
.access-overlay{position:fixed;inset:0;background:rgba(3,7,18,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:8000;display:flex;align-items:center;justify-content:center;padding:20px;}
.access-card{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:24px;
  padding:40px 32px;width:100%;max-width:400px;text-align:center;
  box-shadow:var(--sm);animation:pageIn .4s ease both;
}
.access-icon{font-size:42px;margin-bottom:12px;display:inline-block;animation:floatIcon 3s ease-in-out infinite;}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.access-title{font-family:var(--font-h);font-size:24px;font-weight:800;color:#fff;margin-bottom:8px;}
.access-desc{font-size:13.5px;color:var(--sub);margin-bottom:24px;line-height:1.5;}
.access-input-wrap{margin-bottom:18px;}
.access-input-wrap input{
  width:100%;padding:14px;border-radius:14px;border:1.5px solid var(--border);
  background:rgba(255,255,255,0.05);color:#fff;font-size:16px;text-align:center;outline:none;
  transition:all var(--ease);letter-spacing:1px;font-weight:600;
}
.access-input-wrap input:focus{border-color:var(--accent);background:rgba(255,255,255,0.08);box-shadow:0 0 0 4px rgba(99,102,241,0.15);}
.access-btn{width:100%;padding:14px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border-radius:14px;transition:all var(--ease);box-shadow:0 4px 15px rgba(99,102,241,0.25);}
.access-btn:hover{background:var(--accent-h);transform:translateY(-1px);}
.access-err{color:#f87171;font-size:13px;margin-top:12px;min-height:18px;}

/* ─── HIDDEN ─── */
.hidden{display:none!important;}

/* ─── APP SHELL ─── */
#app-screen{display:flex;height:100vh;overflow:hidden;background:#030712;}

/* ─── SIDEBAR ─── */
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100%;flex-shrink:0;
  background:rgba(10,15,30,0.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:200;transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sidebar-logo{padding:20px 24px;border-bottom:1px solid var(--border);}
.sidebar-logo-text{font-family:var(--font-h);font-size:18px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px;}
.sidebar-logo-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 14px;}
.nav-section{font-size:10px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:1px;padding:14px 10px 6px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;font-size:14px;font-weight:500;color:var(--sub);cursor:pointer;transition:all var(--ease);margin-bottom:3px;width:100%;text-align:left;}
.nav-item:hover{background:var(--accent-l);color:#fff;}
.nav-item.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 4px 12px rgba(99,102,241,0.2);}
.nav-item .icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);background:rgba(255,255,255,0.01);}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.footer-actions{display:flex;gap:4px;margin-left:auto;}
.icon-btn{background:none;border:none;font-size:16px;color:var(--sub);padding:6px;border-radius:8px;transition:all var(--ease);}
.icon-btn:hover{background:var(--accent-l);color:#fff;}
.icon-btn.danger:hover{background:rgba(239,68,68,0.15);color:var(--red);}

/* ─── TOPBAR ─── */
.topbar{display:flex;align-items:center;gap:12px;padding:0 24px;height:var(--hh);min-height:var(--hh);background:rgba(10,15,30,0.4);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-title{font-family:var(--font-h);font-size:19px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.menu-btn{background:none;border:none;font-size:22px;color:var(--sub);display:none;padding:4px 6px;border-radius:8px;flex-shrink:0;}
.menu-btn:hover{background:var(--accent-l);color:#fff;}
.live-chip{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--green);background:rgba(16,185,129,0.1);padding:4px 10px;border-radius:100px;white-space:nowrap;}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── MAIN ─── */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.main-area{flex:1;overflow-y:auto;padding:24px;}

/* ─── STATS GRID ─── */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rc);padding:20px;box-shadow:var(--sc);transition:transform var(--ease), border-color var(--ease);}
.stat-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}
.stat-label{font-size:10.5px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-val{font-family:var(--font-h);font-size:28px;font-weight:800;color:#fff;line-height:1;}
.stat-sub{font-size:11.5px;color:var(--mute);margin-top:5px;}

/* ─── CONTROLS ─── */
.ctrl-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;}
.ctrl-bar input[type=text],.ctrl-bar input[type=date],.ctrl-bar select{padding:9px 14px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.03);font-size:13px;color:#fff;outline:none;transition:all var(--ease);}
.ctrl-bar input:focus,.ctrl-bar select:focus{border-color:var(--accent);background:rgba(255,255,255,0.07);}
.search-wrap{position:relative;flex:1;min-width:180px;}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mute);font-size:13px;pointer-events:none;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:12px;border:none;font-size:13px;font-weight:600;transition:all var(--ease);cursor:pointer;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,0.2);}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px);}
.btn-ghost{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:#fff;}
.btn-ghost:hover{background:rgba(255,255,255,0.08);}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 4px 12px rgba(239,68,68,0.2);}
.btn-danger:hover{background:#dc2626;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-icon{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:5px 8px;font-size:12px;color:#fff;cursor:pointer;transition:all var(--ease);}
.btn-icon:hover{background:var(--accent);border-color:var(--accent);}
.view-toggle{display:flex;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px;}
.view-btn{padding:7px 13px;border:none;background:transparent;border-radius:9px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer;transition:all var(--ease);}
.view-btn.active{background:rgba(255,255,255,0.08);color:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.2);}

/* ─── TABLE ─── */
.table-wrap{overflow-x:auto;border-radius:var(--rc);border:1px solid var(--border);background:var(--card);box-shadow:var(--sc);-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px;}
th{text-align:left;padding:12px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sub);border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:rgba(255,255,255,0.005);}
tbody tr:hover td{background:rgba(255,255,255,0.025)!important;transition:background 100ms;}
.name-cell{display:flex;align-items:center;gap:10px;}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0;}
.member-name{font-weight:700;font-size:13px;white-space:nowrap;color:#fff;}
.member-role{font-size:11px;color:var(--mute);margin-top:1px;}
.score-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:700;white-space:nowrap;}
.s0,.s1{background:rgba(239,68,68,0.15);color:#fca5a5;}
.s2,.s3{background:rgba(245,158,11,0.15);color:#fde047;}
.s4,.s5{background:rgba(16,185,129,0.15);color:#a7f3d0;}
.dots{display:flex;gap:3px;margin-top:5px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-fill{background:var(--accent);}
.dot-empty{background:rgba(255,255,255,0.1);}
.total-ring{width:42px;height:42px;position:relative;flex-shrink:0;}
.total-ring svg{transform:rotate(-90deg);}
.total-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;color:#fff;}
.edit-cell{cursor:pointer;border-radius:8px;padding:4px 6px;transition:background var(--ease);}
.edit-cell:hover{background:rgba(255,255,255,0.05);}
.action-btns{display:flex;gap:5px;opacity:0;transition:opacity var(--ease);}
tr:hover .action-btns{opacity:1;}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(3,7,18,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#0e1322;border:1px solid var(--border);border-radius:var(--rm);box-shadow:var(--sm);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:640px;}
.modal-hd{padding:22px 24px 0;display:flex;align-items:center;justify-content:between;}
.modal-title{font-family:var(--font-h);font-size:17px;font-weight:800;color:#fff;}
.modal-close{background:none;border:none;font-size:22px;color:var(--sub);cursor:pointer;line-height:1;padding:2px 6px;border-radius:8px;}
.modal-close:hover{color:var(--red);background:rgba(239,68,68,0.1);}
.modal-bd{padding:18px 24px;}
.modal-ft{padding:0 24px 22px;display:flex;gap:10px;justify-content:flex-end;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:rgba(255,255,255,0.03);font-size:14px;color:#fff;outline:none;transition:border-color var(--ease);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);background:rgba(255,255,255,0.06);}
.form-group textarea{resize:vertical;min-height:76px;}
.score-sel{display:flex;gap:6px;flex-wrap:wrap;}
.score-opt{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);background:rgba(255,255,255,0.03);font-size:14px;font-weight:700;color:var(--sub);cursor:pointer;transition:all var(--ease);}
.score-opt:hover{border-color:var(--accent);color:#fff;}
.score-opt.sel{border-color:var(--accent);background:var(--accent);color:#fff;}
.enter-hint{font-size:11px;color:var(--mute);margin-top:12px;text-align:right;}
.enter-hint kbd{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:9.5px;font-family:monospace;color:var(--sub);}

/* ─── PERIOD TABLE ─── */
.period-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:600px;}
.period-table th{text-align:center;padding:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);border-bottom:1px solid var(--border);}
.period-table th:first-child{text-align:left;}
.period-table td{text-align:center;padding:11px 10px;border-bottom:1px solid var(--border);}
.period-table td:first-child{text-align:left;font-weight:700;color:#fff;}
.progress-bar{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-top:5px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8b5cf6);border-radius:3px;transition:width .4s ease;}

/* ─── LEADERBOARD ─── */
.lb-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.lb-item:last-child{border-bottom:none;}
.lb-rank{font-size:18px;width:28px;text-align:center;flex-shrink:0;}
.lb-bar-wrap{flex:1;min-width:0;}
.lb-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent),#8b5cf6);margin-top:5px;}

/* ─── PROFILE ─── */
.profile-section{background:var(--card);border:1px solid var(--border);border-radius:var(--rc);box-shadow:var(--sc);padding:24px;margin-bottom:16px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:14px;}
.profile-name{font-family:var(--font-h);font-size:22px;font-weight:800;color:#fff;}
.profile-role{font-size:13px;color:var(--sub);margin-top:2px;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.profile-stat{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:14px 16px;}
.profile-stat-label{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.profile-stat-val{font-family:var(--font-h);font-size:22px;font-weight:800;margin-top:4px;color:#fff;}

/* ─── PILLS ─── */
.pills{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px;}
.pill{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:100px;padding:7px 14px;font-size:12.5px;font-weight:600;}
.pill span{font-weight:800;color:var(--accent);}

/* ─── CHART CARD ─── */
.chart-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--rc);padding:18px;margin-bottom:16px;}
.chart-title{font-size:12.5px;font-weight:700;margin-bottom:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
canvas{display:block;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#fff;color:#000;padding:11px 22px;border-radius:100px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s ease;box-shadow:0 8px 30px rgba(0,0,0,0.5);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ─── TOPBAR RIGHT ─── */
.topbar-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.topbar-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;}
.topbar-logout{width:34px;height:34px;border-radius:10px;background:rgba(239,68,68,0.15);color:var(--red);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;}
.topbar-logout:hover{background:rgba(239,68,68,0.25);}

/* ─── SETTINGS ─── */
.settings-code{background:#000;color:#10b981;border-radius:12px;padding:16px;font-family:monospace;font-size:11.5px;line-height:1.7;overflow-x:auto;margin:10px 0;border:1px solid var(--border);}
.settings-step{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13.5px;line-height:1.5;color:var(--sub);}
.step-text a{color:var(--accent);text-decoration:none;}
.step-text a:hover{text-decoration:underline;}

/* ─── SECTION HEADER ─── */
.section-hd{display:flex;align-items:center;justify-content:between;margin-bottom:14px;}
.section-title{font-family:var(--font-h);font-size:16px;font-weight:800;color:#fff;}

/* ─── MOBILE OVERLAY ─── */
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:190;display:none;}
.mobile-overlay.show{display:block;}



/* ─── PARTICLES ─── */
#particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.particle{position:absolute;border-radius:50%;opacity:.15;animation:float linear infinite;}
@keyframes float{0%{transform:translateY(100vh) scale(0);}100%{transform:translateY(-120px) scale(1);}}

/* ─── RESPONSIVE BREAKPOINTS ─── */
@media(min-width:1440px){
  :root{--sw:260px;}
  .main-area{padding:32px 40px;}
  .card-grid{grid-template-columns:repeat(5,1fr);}
  .stat-val{font-size:32px;}
  .topbar{padding:0 28px;}
}
@media(min-width:640px) and (max-width:1023px){
  :root{--sw:200px;}
  .card-grid{grid-template-columns:repeat(3,1fr);}
  .main-area{padding:18px;}
  .topbar{padding:0 16px;}
  .stat-val{font-size:24px;}
  table{font-size:12px;}
}
@media(max-width:639px){
  :root{--hh:54px;}
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 30px rgba(0,0,0,0.6);z-index:220;}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:block;}
  .main-area{padding:14px;}
  .topbar{padding:0 14px;}
  .card-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .stat-val{font-size:22px;}
  .ctrl-bar{gap:8px;}
  .ctrl-bar input[type=date]{width:100%;order:2;}
  .search-wrap{order:1;min-width:100%;}
  .view-toggle{order:3;}
  .btn-primary{order:4;width:100%;justify-content:center;}
  .table-wrap{border-radius:14px;}
  table{min-width:640px;font-size:12px;}
  .login-card{padding:32px 24px;}
  .login-logo{font-size:24px;}
  .access-card{padding:30px 20px;}
  .profile-grid{grid-template-columns:1fr;}
  .live-chip .live-text{display:none;}
}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>


<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="ld-logo">GrowthCircle</div>
  <div class="ld-sub">Community Dashboard</div>
  <div class="spinner"></div>
</div>

<!-- SUPABASE CREDENTIALS SETUP CARD (shown if not configured) -->
<div id="setup-screen" class="setup-overlay hidden">
  <div class="setup-card">
    <div style="font-size:40px;margin-bottom:12px">⚡</div>
    <h2 class="access-title">Configure Supabase</h2>
    <p class="access-desc">Please enter your Supabase credentials to connect this dashboard database. These are stored locally in your browser.</p>
    <div class="form-group" style="text-align:left">
      <label>Supabase Project URL</label>
      <input type="text" id="setup-url" placeholder="https://your-project.supabase.co"/>
    </div>
    <div class="form-group" style="text-align:left">
      <label>Supabase Anon Key</label>
      <input type="password" id="setup-key" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."/>
    </div>
    <button class="access-btn" onclick="saveSupabaseConfig()">Save &amp; Connect</button>
    <div class="access-err" id="setup-err"></div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="hidden">
  <div class="login-layout">
    <div class="login-card" id="login-card">
      <div class="login-logo">GrowthCircle</div>
      <div class="login-sub">Community Dashboard</div>
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- SIGN IN FORM -->
      <div id="form-signin">
        <div class="field-wrap">
          <label>Email Address</label>
          <input type="email" id="si-email" placeholder="name@email.com" autocomplete="email"/>
        </div>
        <div class="field-wrap">
          <label>Password</label>
          <input type="password" id="si-pass" placeholder="Enter password"/>
          <button class="eye-btn" onclick="toggleEye('si-pass',this)" type="button">👁</button>
        </div>
        <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot password?</a>
        <button class="login-btn" onclick="doSignIn()">Sign In</button>
        
        <div class="divider"><span>or continue with</span></div>
        <button class="google-btn" onclick="doGoogleSignIn()">
          <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <div class="login-err" id="si-err"></div>
      </div>

      <!-- SIGN UP FORM -->
      <div id="form-signup" style="display:none">
        <div class="field-wrap">
          <label>Username</label>
          <input type="text" id="su-user" placeholder="Choose a username"/>
        </div>
        <div class="field-wrap">
          <label>Email Address</label>
          <input type="email" id="su-email" placeholder="name@email.com"/>
        </div>
        <div class="field-wrap">
          <label>Phone Number</label>
          <input type="tel" id="su-phone" placeholder="e.g. +60123456789"/>
        </div>
        <div class="field-wrap">
          <label>Password</label>
          <input type="password" id="su-pass" placeholder="At least 6 characters"/>
          <button class="eye-btn" onclick="toggleEye('su-pass',this)" type="button">👁</button>
        </div>
        <div class="field-wrap">
          <label>Access Code</label>
          <input type="password" id="su-code" placeholder="Enter student or admin access code"/>
          <button class="eye-btn" onclick="toggleEye('su-code',this)" type="button">👁</button>
        </div>
        <button class="login-btn" onclick="doSignUp()">Create Account</button>
        <div class="login-err" id="su-err"></div>
      </div>
    </div>

    <!-- EYE ANIMATED CHARACTER -->
    <div class="login-character" id="login-char">
      <svg class="char-svg" viewBox="0 0 180 380" xmlns="http://www.w3.org/2000/svg">

/* ─── BOOTSTRAP ─── */
async function boot() {
  // Check Supabase Configuration first
  if (!isSupabaseConfigured()) {
    document.getElementById('loading-screen').classList.add('fade-out');
    document.getElementById('setup-screen').classList.remove('hidden');
    return;
  }

  // Setup Auth State Listener
  supabaseClient.auth.onAuthStateChange(async (event, session) => {
    if (session) {
      // User is logged in
      currentUser = {
        uid: session.user.id,
        email: session.user.email,
        username: session.user.user_metadata?.username || session.user.email.split('@')[0],
        role: 'student' // base fallback
      };

      // Retrieve user's actual profile details
      try {
        const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) {
          currentUser.username = profile.username;
          currentUser.phone = profile.phone;
          currentUser.role = profile.role;
        }
      } catch (e) {}

      hideLoading();
      showApp();

      // Check if we are in Password Recovery flow
      if (event === 'PASSWORD_RECOVERY') {
        showResetPasswordModal();
      }
    } else {
      currentUser = null;
      hideLoading();
      showLoginScreen();
    }
  });

  // Start checking hash manually for recovery links if event trigger didn't catch it
  checkUrlHashRecovery();
}

window.addEventListener('DOMContentLoaded', boot);

function hideLoading() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('fade-out');
  setTimeout(() => ls.classList.add('hidden'), 500);
}

function showLoginScreen() {
  document.getElementById('app-screen').classList.add('hidden');

}

function showApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app-screen').classList.remove('hidden');

  const n = currentUser.username;
  
  // Set UI profiles
  const av = document.getElementById('sidebar-avatar');
  av.textContent = initials(n);
  av.style.background = avatarColor(n);
  
  document.getElementById('sidebar-name').textContent = n;
  document.getElementById('sidebar-role').textContent = currentUser.role === 'admin' ? 'Administrator' : 'Student';

  const tav = document.getElementById('topbar-avatar');
  if (tav) {
    tav.textContent = initials(n);
    tav.style.background = avatarColor(n);
  }

  // Admin section display toggle
  const adminNav = document.getElementById('admin-nav-section');
  if (currentUser.role === 'admin') {
    adminNav.classList.remove('hidden');
  } else {
    adminNav.classList.add('hidden');
  }

  // Load backend database items
  dbReady = false;
  loadData();
}

/* ─── FETCH & REAL-TIME DATA SYNC ─── */
async function loadData() {
  try {
    if (!supabaseClient) throw new Error("Supabase client is not initialized.");
    const { data: members, error: mErr } = await supabaseClient.from('members').select('*').order('created_at', { ascending: true });
    if (mErr) throw mErr;
    const { data: records, error: rErr } = await supabaseClient.from('records').select('*');
    if (rErr) throw rErr;

    if (members) DB.members = members;
    if (records) {
      DB.records = {};
      records.forEach(r => {
        DB.records[recKey(r.member_id, r.date)] = {
          taskScore: r.task_score,
          taskText: r.task_text,
          engagement: r.engagement,
          attendance: r.attendance,
          growth: r.growth,
          habit: r.habit,
          screenTime: parseFloat(r.screen_time) || 0,
          attLevel: r.att_level
        };
      });
    }
    dbReady = true;
    if (!currentPage) navigate('dashboard');
    else renderPage();
  } catch (e) {
    console.error("Error loading Supabase data:", e);
    const sub = document.querySelector('#loading-screen .ld-sub');
    if (sub) {
      sub.innerHTML = `<span style="color:#f87171;font-weight:600">⚠️ Connection Failed: ${e.message}</span><br/><br/>
                       <button class="btn btn-ghost btn-sm" onclick="clearSupabaseConfig()" style="margin-top:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);padding:8px 12px;border-radius:8px;color:#fff">Reset Connection Credentials</button>`;
    }
    const spinner = document.querySelector('#loading-screen .spinner');
    if (spinner) spinner.style.display = 'none';
  }
}

/* ─── DATA PERSISTENCE ─── */
async function saveRec(mid, date, data) {
  const key = recKey(mid, date);
  const existing = DB.records[key] || { taskScore:0, taskText:'', engagement:0, attendance:0, growth:0, habit:'', screenTime:0, attLevel:0 };
  const merged = { ...existing, ...data };

  const dbRow = {
    id: key,
    member_id: mid,
    date: date,
    task_score: merged.taskScore,
    task_text: merged.taskText,
    engagement: merged.engagement,
    attendance: merged.attendance,
    growth: merged.growth,
    habit: merged.habit,
    screen_time: merged.screenTime,
    att_level: merged.attLevel,
    updated_at: new Date().toISOString()
  };

  const { error } = await supabaseClient.from('records').upsert(dbRow);
  if (error) {
    console.error(error);
    showToast("⚠️ Save error: " + error.message, 3000);
    throw error;
  }
  DB.records[key] = merged;
  renderPage();
}

async function doSignUp() {
  const user = document.getElementById('su-user').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const phone = document.getElementById('su-phone').value.trim();
  const pass = document.getElementById('su-pass').value;
  const code = document.getElementById('su-code').value.trim();
  const err = document.getElementById('su-err');
  err.textContent = "";

  if (!user || !email || !phone || !pass || !code) {
    err.textContent = "All fields are required.";
    return;
  }

  let role = '';
  if (code === 'admin@growthcircle') {
    role = 'admin';
  } else if (code === 'student@growthcircle') {
    role = 'student';
  } else {
    err.textContent = "Invalid access code.";
    return;
  }

  if (pass.length < 6) {
    err.textContent = "Password must be at least 6 characters.";
    return;
  }

  // Supabase Signup with metadata
  const { error } = await supabaseClient.auth.signUp({
    email,
    password: pass,
    options: {
      data: {
        username: user,
        phone: phone,
        role: role
      }
    }
  });

  if (error) {
    err.textContent = error.message;
  } else {
    showToast("Account created! Check your email to confirm.", 4000);
    switchTab('signin');
  }
}

function showForgotPassword(e) {

      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="name@email.com" autofocus/>

async function triggerForgotPassword() {
  const email = document.getElementById('forgot-email').value.trim();
  const msg = document.getElementById('forgot-msg');
  if (!email) {
    msg.style.color = 'var(--red)';

  }

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {

async function doResetPassword() {
  const pass = document.getElementById('rp-pass').value;
  const pass2 = document.getElementById('rp-pass2').value;
  const err = document.getElementById('rp-err');

  if (!pass || !pass2) {

/* ─── DASHBOARD ─── */
function renderDashboard(container) {
  const isAdmin = currentUser.role === 'admin';
  let activeToday = 0, totalScore = 0;

  DB.members.forEach(m => {
    const r = getRec(m.id, currentDate);
    const t = dailyTotal(r);
    totalScore += t;
    if (t > 0) activeToday++;
  });

  const avg = DB.members.length ? Math.round(totalScore / DB.members.length * 10) / 10 : 0;
  const dateLabel = new Date(currentDate + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  let html = `
  <div class="ctrl-bar">
    <div class="search-wrap"><span class="search-icon">🔍</span>
      <input type="text" id="search-inp" placeholder="Search members…" value="${esc(searchQ)}"
        oninput="searchQ=this.value;renderDashboard(document.getElementById('main-area'))"/>
    </div>
    <input type="date" id="date-inp" value="${currentDate}"
      onchange="currentDate=this.value;renderDashboard(document.getElementById('main-area'))"/>
    <div class="view-toggle">
      <button class="view-btn ${currentView === 'daily' ? 'active' : ''}" onclick="currentView='daily';renderDashboard(document.getElementById('main-area'))">Daily</button>
      <button class="view-btn ${currentView === 'weekly' ? 'active' : ''}" onclick="currentView='weekly';renderDashboard(document.getElementById('main-area'))">Weekly</button>
      <button class="view-btn ${currentView === 'monthly' ? 'active' : ''}" onclick="currentView='monthly';renderDashboard(document.getElementById('main-area'))">Monthly</button>
    </div>
    ${isAdmin ? `<button class="btn btn-primary" onclick="showAddMember()">＋ Add Member</button>` : ''}
  </div>
  <div class="card-grid">
    <div class="stat-card"><div class="stat-label">Members</div><div class="stat-val">${DB.members.length}</div><div class="stat-sub">Total</div></div>
    <div class="stat-card"><div class="stat-label">Active Today</div><div class="stat-val">${activeToday}</div><div class="stat-sub">Have entries</div></div>
    <div class="stat-card"><div class="stat-label">Avg Score</div><div class="stat-val">${avg}</div><div class="stat-sub">Out of 20</div></div>
    <div class="stat-card"><div class="stat-label">Date</div><div class="stat-val" style="font-size:16px">${dateLabel}</div><div class="stat-sub">Selected</div></div>
  </div>`;

  if (currentView === 'daily') html += renderDailyTable(isAdmin);
  else if (currentView === 'weekly') html += renderWeeklyTable();
  else html += renderMonthlyTable();

  container.innerHTML = html;
}

function filtered() {
  if (!searchQ.trim()) return DB.members;
  const q = searchQ.toLowerCase();
  return DB.members.filter(m => m.name.toLowerCase().includes(q));
}

function renderDailyTable(isAdmin) {
  const members = filtered();
  if (!members.length) return `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rc);padding:48px;text-align:center;color:var(--sub)">No members found.</div>`;
  
  let h = `<div class="table-wrap"><table>
    <thead><tr>
      <th>Member</th><th>Task</th><th>Engagement</th><th>Attendance</th><th>Growth</th><th>Screen</th><th>Total</th>
      <th></th>
    </tr></thead><tbody>`;

  const loggedInUsername = currentUser && currentUser.username ? currentUser.username.toLowerCase() : "";

  members.forEach(m => {

function renderWeeklyTable() {
  const days = getWeek(currentDate);
  const labels = days.map(d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' }));
  const members = filtered();
  
  let h = `<div class="table-wrap"><table class="period-table"><thead><tr><th>Member</th>`;
  labels.forEach(l => { h += `<th>${l}</th>`; });
  h += `<th>Total</th><th>%</th></tr></thead><tbody>`;

  members.forEach(m => {
    let wt = 0;
    const dt = days.map(d => {
      const r = getRec(m.id, d);
      const t = dailyTotal(r);
      wt += t;
      return t;
    });
    const pct = Math.round(wt / 140 * 100);
    h += `<tr><td><div class="name-cell">${makeAv(m.name)}<span style="margin-left:8px">${esc(m.name)}</span></div></td>`;
    dt.forEach(t => {
      h += `<td><span class="score-badge ${t >= 16 ? 's4' : t >= 10 ? 's2' : 's0'}">${t}</span></td>`;
    });
    h += `<td><strong>${wt}</strong></td><td><div>${pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></td></tr>`;
  });
  return h + `</tbody></table></div>`;
}

function renderMonthlyTable() {
  const days = getMonth(currentDate);
  const members = filtered();
  const max = days.length * 20;

  let h = `<div class="table-wrap"><table class="period-table"><thead><tr><th>Member</th><th>Total</th><th>Avg/Day</th><th>% of Max</th></tr></thead><tbody>`;
  members.forEach(m => {
    let tot = 0;
    days.forEach(d => { tot += dailyTotal(getRec(m.id, d)); });
    const avg = Math.round(tot / days.length * 10) / 10;
    const pct = Math.round(tot / max * 100);
    h += `<tr><td><div class="name-cell">${makeAv(m.name)}<span style="margin-left:8px">${esc(m.name)}</span></div></td>
      <td><strong>${tot}</strong></td><td>${avg}</td>
      <td><div>${pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></td></tr>`;
  });
  return h + `</tbody></table></div>`;
}

/* ─── LEADERBOARD ─── */
function renderLeaderboard(container) {
  const days = getLast7();
  const stats = DB.members.map(m => {
    let wt = 0;
    days.forEach(d => { wt += dailyTotal(getRec(m.id, d)); });
    return { m, wt };
  }).sort((a, b) => b.wt - a.wt);

  const maxWt = stats[0]?.wt || 1;
  const medals = ['🥇', '🥈', '🥉'];
  
  let h = `<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--rc);box-shadow:var(--sc);padding:24px">
    <div class="section-hd">
      <div class="section-title">🏆 Weekly Leaderboard</div>
      <div style="font-size:12px;color:var(--sub)">Last 7 days · Max 140pts</div>
    </div>`;

  stats.forEach(({ m, wt }, i) => {
    const pct = Math.round(wt / maxWt * 100);
    h += `<div class="lb-item">
      <div class="lb-rank">${medals[i] || `<span style="font-size:14px;font-weight:700;color:var(--sub)">${i + 1}</span>`}</div>
      ${makeAv(m.name, 36)}

        <div style="font-weight:700;font-size:14px;color:#fff">${esc(m.name)}</div>

      </div>
      <div style="font-weight:800;font-size:18px;color:var(--accent)">${wt}</div>
    </div>`;
  });
  container.innerHTML = h + `</div>`;
}

async function updateProfileDetails() {
  const username = document.getElementById('cp-user').value.trim();
  const phone = document.getElementById('cp-phone').value.trim();
  const newPass = document.getElementById('cp-new').value;
  const msg = document.getElementById('cp-msg');
  msg.textContent = "";

  if (!username) {
    msg.style.color = 'var(--red)';
    msg.textContent = "Username is required.";
    return;
  }

  try {
    // 1. Update profiles table
    const { error: pErr } = await supabaseClient.from('profiles').update({ username, phone }).eq('id', currentUser.uid);
    if (pErr) throw pErr;

    // 2. If password provided, update auth
    if (newPass) {
      if (newPass.length < 6) {
        msg.style.color = 'var(--red)';
        msg.textContent = "Password must be at least 6 characters.";
        return;
      }
      const { error: aErr } = await supabaseClient.auth.updateUser({ password: newPass });
      if (aErr) throw aErr;
    }

    currentUser.username = username;
    currentUser.phone = phone;
    document.getElementById('sidebar-name').textContent = username;
    
    msg.style.color = 'var(--green)';
    msg.textContent = "✅ Details updated successfully!";
    showToast("Profile updated!");
  } catch (e) {
    msg.style.color = 'var(--red)';
    msg.textContent = e.message || "Failed to update profile details.";
  }
}

function copyCode() {

}

async function loadSheetsUrl() {
  try {
    const inp = document.getElementById('sheets-url-inp');
    const url = localStorage.getItem('gc_sheets_url') || "";
    if (inp) inp.value = url;
  } catch (e) {}
}

function saveSheetsUrl() {
  const url = document.getElementById('sheets-url-inp').value.trim();
  const msg = document.getElementById('sheets-msg');
  localStorage.setItem('gc_sheets_url', url);
  msg.style.color = 'var(--green)';
  msg.textContent = "✅ Google Sheets logging URL saved!";
  showToast("Sheets URL updated!");
}

function logToSheets(username, phone, action, role) {
  const sheetsUrl = localStorage.getItem('gc_sheets_url');
  if (!sheetsUrl) return;
  const url = `${sheetsUrl}?username=${encodeURIComponent(username)}&phone=${encodeURIComponent(phone || '')}&action=${encodeURIComponent(action)}&role=${encodeURIComponent(role)}`;
  fetch(url, { mode: 'no-cors' }).catch(() => {});
}

function clearSupabaseConfig() {
  localStorage.removeItem('gc_sb_url');
  localStorage.removeItem('gc_sb_key');
  showToast("Supabase credentials cleared! Reloading...", 2000);
  setTimeout(() => window.location.reload(), 1200);
}

function confirmClearAll() {
  showModal(modalWrap('⚠️ Clear All Data',
    `<p style="font-size:15px;line-height:1.6">This will permanently delete <b>all members and records</b> from the database.<br/><br/>This cannot be undone. Are you absolutely sure?</p>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="doClearAll()">Yes, Delete Everything</button>`
  ));
}

async function doClearAll() {
  closeModal();
  showToast("🗑️ Clearing dashboard data...", 4000);
  try {
    // Delete all members (cascades to records)
    const { error } = await supabaseClient.from('members').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    if (error) throw error;
    showToast("✅ All database data cleared!");
    loadData();
  } catch (e) {
    showToast("⚠️ Clear failed: " + e.message, 3000);
  }
}

/* ─── MODALS ─── */
function showModal(html) {
  document.getElementById('modal-container').innerHTML = `<div class="overlay" onclick="if(event.target===this)closeModal()">${html}</div>`;
  document.addEventListener('keydown', escHandler);
}

function closeModal() {
  document.getElementById('modal-container').innerHTML = '';
  document.removeEventListener('keydown', escHandler);
}

function escHandler(e) { if (e.key === 'Escape') closeModal(); }

function modalWrap(title, body, footer, lg = '') {
  return `<div class="modal${lg ? ' modal-lg' : ''}">
    <div class="modal-hd"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-bd">${body}</div>
    <div class="modal-ft">${footer}</div>
  </div>`;
}

  showModal(modalWrap('Edit Growth Check-In',
    `<div class="form-group"><label>Growth Score (0–5)</label><div class="score-sel" id="gr-sel">${opts}</div></div>
     <div class="form-group"><label>Habit Note</label><input type="text" id="habit-inp" value="${esc(r.habit || '')}" placeholder="e.g. On track"/></div>
     <div class="enter-hint">Press <kbd>Enter</kbd> to save</div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doSaveGrowth('${mid}','${date}')">Save</button>`
  ));
}

async function doSaveGrowth(mid, date) {
  const sc = parseInt(document.querySelector('#gr-sel .sel')?.dataset.val ?? 0);
  const habit = document.getElementById('habit-inp').value;
  await saveRec(mid, date, { growth: sc, habit });
  closeModal();
  showToast("✅ Growth saved!");
}

/* EDIT SCREEN TIME */
function showEditScreen(mid, date) {

    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doSaveScreen('${mid}','${date}')">Save</button>`

async function doSaveScreen(mid, date) {

  showToast("✅ Screen time saved!");

/* MEMBER METRICS CHART MODAL */
function showMemberGraph(mid) {
  const m = DB.members.find(x => x.id === mid);
  const days = getLast7();
  const labels = days.map(d => new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' }));
  const totals = days.map(d => dailyTotal(getRec(mid, d)));
  const eng = days.map(d => getRec(mid, d).engagement || 0);
  const st = days.map(d => getRec(mid, d).screenTime || 0);
  const wt = totals.reduce((a, b) => a + b, 0);
  const avgE = Math.round(eng.reduce((a, b) => a + b, 0) / 7 * 10) / 10;
  const avgS = Math.round(st.reduce((a, b) => a + b, 0) / 7 * 10) / 10;

  const body = `
    <div class="pills">
      <div class="pill">Weekly <span>${wt}/140</span></div>
      <div class="pill">Avg Eng <span>${avgE}/5</span></div>
      <div class="pill">Avg Screen <span>${avgS}h</span></div>
    </div>
    <div class="chart-card"><div class="chart-title">📊 Daily Totals (7 days)</div><canvas id="g-bar" height="120"></canvas></div>
    <div class="chart-card"><div class="chart-title">📈 Engagement Trend</div><canvas id="g-eng" height="100"></canvas></div>
    <div class="chart-card"><div class="chart-title">⏱️ Screen Time (hrs)</div><canvas id="g-st" height="100"></canvas></div>`;
  
  showModal(modalWrap(`📊 ${esc(m.name)}`, body, `<button class="btn btn-primary" onclick="closeModal()">Close</button>`, 'lg'));
  setTimeout(() => {
    drawBar('g-bar', labels, totals, 20);
    drawLine('g-eng', labels, eng, 5, '#6366f1');
    drawLine('g-st', labels, st, 8, '#06b6d4');
  }, 120);
}

/* ─── CUSTOM CHART RENDERERS ─── */
function setupCanvas(id) {
  const c = document.getElementById(id); if (!c) return null;
  const ctx = c.getContext('2d'), dpr = window.devicePixelRatio || 1;
  const W = c.offsetWidth || c.parentElement?.offsetWidth || 380, H = c.offsetHeight || 160;
  c.width = W * dpr; c.height = H * dpr; c.style.width = W + 'px'; c.style.height = H + 'px';
  ctx.scale(dpr, dpr); return { ctx, W, H };
}

function drawBar(id, labels, values, maxVal) {
  const r = setupCanvas(id); if (!r) return;
  const { ctx, W, H } = r, pL = 10, pR = 10, pT = 24, pB = 26, cW = W - pL - pR, cH = H - pT - pB, n = labels.length, gap = cW / n, bW = gap * .55;
  values.forEach((v, i) => {
    const x = pL + i * gap + (gap - bW) / 2, bH = Math.max(1, (v / maxVal) * cH), y = pT + cH - bH;
    ctx.fillStyle = v >= 16 ? 'var(--green)' : v >= 10 ? 'var(--amber)' : 'var(--accent)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, bW, bH, [5, 5, 0, 0]);
    else ctx.rect(x, y, bW, bH);
    ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Inter'; ctx.textAlign = 'center'; ctx.fillText(v, x + bW / 2, y - 5);
    ctx.fillStyle = 'var(--mute)'; ctx.font = '10px Inter'; ctx.fillText(labels[i], x + bW / 2, pT + cH + 16);
  });
}

function drawLine(id, labels, values, maxVal, color) {
  const r = setupCanvas(id); if (!r) return;
  const { ctx, W, H } = r, pL = 28, pR = 16, pT = 22, pB = 26, cW = W - pL - pR, cH = H - pT - pB, n = values.length; if (n < 2) return;
  const gx = i => pL + (i / (n - 1)) * cW, gy = v => pT + cH - (Math.min(v, maxVal) / maxVal) * cH;
  
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  [0, .25, .5, .75, 1].forEach(t => { const y = pT + cH - t * cH; ctx.beginPath(); ctx.moveTo(pL, y); ctx.lineTo(pL + cW, y); ctx.stroke(); });

  const grad = ctx.createLinearGradient(0, pT, 0, pT + cH);
  grad.addColorStop(0, color + '2b'); grad.addColorStop(1, color + '00');
  ctx.beginPath(); ctx.moveTo(gx(0), gy(values[0]));
  values.forEach((_, i) => { if (i > 0) ctx.lineTo(gx(i), gy(values[i])); });
  ctx.lineTo(gx(n - 1), pT + cH); ctx.lineTo(gx(0), pT + cH); ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath(); ctx.moveTo(gx(0), gy(values[0]));
  values.forEach((_, i) => { if (i > 0) ctx.lineTo(gx(i), gy(values[i])); });
  ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.stroke();

  values.forEach((v, i) => {
    ctx.beginPath(); ctx.arc(gx(i), gy(v), 3.5, 0, Math.PI * 2); ctx.fillStyle = '#111'; ctx.fill(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = 'var(--mute)'; ctx.font = '9.5px Inter'; ctx.textAlign = 'center'; ctx.fillText(labels[i], gx(i), pT + cH + 16);
  });
}

/* ─── MATHS & HELPERS ─── */
function avatarColor(n) {
  let h = 0;
  for (let c of n) h = (h << 5) - h + c.charCodeAt(0);
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(n) { return n.trim().split(' ').map(w => w[0]?.toUpperCase() || '').slice(0, 2).join(''); }
function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function recKey(mid, date) { return mid + '_' + date; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function attLabel(l) { return ['', 'Absent', 'Very Late', 'Late', 'On Time', 'Active', 'Champion'][l] || ''; }
function scClass(s) { if (s <= 1) return 's0'; if (s <= 3) return 's2'; return 's4'; }
function dailyTotal(r) { return (r.taskScore || 0) + (r.engagement || 0) + (r.attendance || 0) + (r.growth || 0); }
function makeAv(name, size = 34) { return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size * .38)}px;background:${avatarColor(name)}">${initials(name)}</div>`; }
function makeDots(sc, max = 5) { let h = '<div class="dots">'; for (let i = 1; i <= max; i++) h += `<div class="dot ${i <= sc ? 'dot-fill' : 'dot-empty'}"></div>`; return h + '</div>'; }
function makeRing(tot, max = 20) {
  const pct = Math.min(tot / max, 1), r = 16, circ = 2 * Math.PI * r;
  const color = tot >= 16 ? 'var(--green)' : tot >= 10 ? 'var(--amber)' : 'var(--accent)';
  return `<div class="total-ring"><svg width="42" height="42" viewBox="0 0 44 44">
    <circle cx="22" cy="22" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="3"/>
    <circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${pct * circ} ${circ - pct * circ}" stroke-linecap="round"/>
  </svg><div class="total-num">${tot}</div></div>`;
}

function showToast(msg, ms = 2600) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), ms);
}

function getLast7() { const days = []; const t = new Date(); for (let i = 6; i >= 0; i--) { const d = new Date(t); d.setDate(d.getDate() - i); days.push(d.toISOString().slice(0, 10)); } return days; }
function getWeek(dateStr) { const d = new Date(dateStr), dow = d.getDay(), mon = new Date(d); mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1)); const days = []; for (let i = 0; i < 7; i++) { const x = new Date(mon); x.setDate(mon.getDate() + i); days.push(x.toISOString().slice(0, 10)); } return days; }
function getMonth(dateStr) { const d = new Date(dateStr), y = d.getFullYear(), m = d.getMonth(); const days = []; const t = new Date(y, m + 1, 0).getDate(); for (let i = 1; i <= t; i++) days.push(`${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`); return days; }
function getRec(mid, date) { return DB.records[recKey(mid, date)] || { taskScore: 0, taskText: '', engagement: 0, attendance: 0, growth: 0, habit: '', screenTime: 0, attLevel: 0 }; }

/* ─── ENTER KEY GLOBAL TRIGGER ─── */
document.addEventListener('keydown', function (e) {
  if (e.key !== 'Enter') return;
  if (e.target.tagName === 'TEXTAREA') return;

  const overlay = document.querySelector('.overlay');
  if (overlay) {
    const btn = overlay.querySelector('.modal-ft .btn-primary');
    if (btn) { e.preventDefault(); btn.click(); }
    return;
  }

  const siForm = document.getElementById('form-signin');
  const suForm = document.getElementById('form-signup');
  const accessOverlay = document.getElementById('access-code-overlay');
  
  if (accessOverlay && !accessOverlay.classList.contains('hidden')) { submitAccessCode(); return; }
  if (siForm && siForm.style.display !== 'none') { doSignIn(); return; }
  if (suForm && suForm.style.display !== 'none') { doSignUp(); return; }
});

/* ─── GSAP & PARTICLES ANIMATIONS ─── */
function initFloatingParticles() {
  const loginBg = document.getElementById('login-screen');
  if (!loginBg || document.getElementById('particles')) return;
  const pc = document.createElement('div'); pc.id = 'particles'; loginBg.appendChild(pc);
  const colors = ['rgba(99,102,241,0.2)', 'rgba(139,92,246,0.15)', 'rgba(255,255,255,0.05)'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const size = Math.random() * 40 + 8;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random() * 100}%;background:${colors[Math.floor(Math.random() * colors.length)]};animation-duration:${Math.random() * 12 + 8}s;animation-delay:${Math.random() * 8}s;`;
    pc.appendChild(p);
  }
}

(function initPageAnimations() {
  // Page level render animations (intercept rendering to animate cards)
  const origRenderPage = window.renderPage;
  window.renderPage = function () {
    origRenderPage();
    setTimeout(() => {
      if (typeof gsap === 'undefined') return;
      gsap.from('.stat-card', { y: 15, opacity: 0, duration: .4, stagger: .05, ease: 'power2.out' });
      gsap.from('tbody tr', { y: 12, opacity: 0, duration: .35, stagger: .03, ease: 'power2.out' });
      
      document.querySelectorAll('.lb-bar').forEach(bar => {
        const w = bar.style.width; bar.style.width = '0%';
        gsap.to(bar, { width: w, duration: .6, ease: 'power2.out', delay: 0.1 });
      });

      // Count up stats
      document.querySelectorAll('.stat-val').forEach(el => {
        const n = parseFloat(el.textContent);
        if (!isNaN(n) && n > 0) {
          let s = 0; const step = n / 15;
          const iv = setInterval(() => { s = Math.min(s + step, n); el.textContent = String(Math.round(s * 10) / 10); if (s >= n) clearInterval(iv); }, 25);
        }
      });
    }, 60);
  };
})();

// Login Character Eye Tracking
(function () {
  const char = document.getElementById('login-char');
  if (!char) return;
  const inputs = ['si-email', 'si-pass', 'su-user', 'su-email', 'su-phone', 'su-pass'];
  inputs.forEach(id => {
    const el = document.getElementById(id); if (!el) return;
    el.addEventListener('focus', () => { char.classList.add('peek'); char.classList.remove('peek-up'); });
    el.addEventListener('blur', () => { char.classList.remove('peek'); char.classList.remove('peek-up'); });
    if (id.includes('pass')) {
      el.addEventListener('focus', () => { char.classList.remove('peek'); char.classList.add('peek-up'); });
    }
  });
})();

// Shake login card
function shakeCard() {
  const c = document.getElementById('login-card');
  c.classList.remove('shake'); void c.offsetWidth; c.classList.add('shake');
}
