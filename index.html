<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GrowthCircle – Community Dashboard</title>
<meta name="description" content="GrowthCircle Community Dashboard – track member scores, attendance, engagement and growth."/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{
  --bg:#F5F5F7;--card:#fff;--border:#E8E8ED;
  --text:#1d1d1f;--sub:#6e6e73;--mute:#aeaeb2;
  --accent:#3730a3;--accent-h:#2e27a0;--accent-l:rgba(55,48,163,.08);
  --green:#34C759;--amber:#FF9F0A;--red:#FF3B30;
  --sw:240px;--hh:60px;
  --rc:18px;--rm:20px;
  --sc:0 2px 20px rgba(0,0,0,.07);
  --sm:0 24px 72px rgba(0,0,0,.18);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --ease:150ms ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
button{cursor:pointer;font-family:var(--font);}
input,select,textarea{font-family:var(--font);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d1d6;border-radius:4px;}

/* LOGIN */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 100%);
}
.login-card{
  background:rgba(255,255,255,.07);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:44px 40px 36px;
  width:min(420px,94vw);
  box-shadow:0 32px 80px rgba(0,0,0,.4);
}
.login-logo{font-size:32px;font-weight:800;color:#fff;text-align:center;margin-bottom:6px;}
.login-sub{text-align:center;color:rgba(255,255,255,.5);font-size:14px;margin-bottom:28px;}
.tab-bar{display:flex;background:rgba(255,255,255,.07);border-radius:12px;padding:4px;margin-bottom:24px;}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;color:rgba(255,255,255,.5);border-radius:9px;font-size:14px;font-weight:600;transition:all var(--ease);}
.tab-btn.active{background:rgba(255,255,255,.15);color:#fff;}
.field-wrap{position:relative;margin-bottom:16px;}
.field-wrap label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.field-wrap input{
  width:100%;padding:13px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);color:#fff;font-size:15px;outline:none;
  transition:border-color var(--ease);
}
.field-wrap input:focus{border-color:rgba(55,48,163,.7);}
.field-wrap input::placeholder{color:rgba(255,255,255,.3);}
.eye-btn{
  position:absolute;right:14px;bottom:13px;
  background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;line-height:1;padding:0;
}
.eye-btn:hover{color:rgba(255,255,255,.8);}
.login-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#3730a3,#7c3aed);
  color:#fff;font-size:15px;font-weight:700;margin-top:8px;
  transition:opacity var(--ease),transform var(--ease);
}
.login-btn:hover{opacity:.9;transform:translateY(-1px);}
.login-btn:active{transform:translateY(0);}
.login-err{color:#ff6b6b;font-size:13px;text-align:center;margin-top:10px;min-height:20px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease;}

/* APP SHELL */
#app-screen{display:flex;height:100vh;overflow:hidden;}
#app-screen.hidden{display:none;}
#login-screen.hidden{display:none;}

/* SIDEBAR */
.sidebar{
  width:var(--sw);min-width:var(--sw);height:100%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  z-index:100;transition:transform var(--ease);
}
.sidebar-logo{padding:20px 20px 12px;border-bottom:1px solid var(--border);}
.sidebar-logo-text{font-size:17px;font-weight:800;color:var(--accent);}
.sidebar-logo-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.sidebar-nav{flex:1;overflow-y:auto;padding:10px 10px;}
.nav-section{font-size:10.5px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.6px;padding:12px 10px 6px;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:11px;font-size:14px;font-weight:500;color:var(--sub);
  cursor:pointer;transition:all var(--ease);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:var(--accent-l);color:var(--accent);}
.nav-item.active{background:var(--accent-l);color:var(--accent);font-weight:700;}
.nav-item .icon{font-size:16px;width:22px;text-align:center;}
.sidebar-footer{padding:16px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-chip .avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.user-chip .name{font-size:13px;font-weight:700;}
.user-chip .role{font-size:11px;color:var(--sub);}
.logout-btn{margin-left:auto;background:none;border:none;font-size:18px;color:var(--sub);padding:4px;}
.logout-btn:hover{color:var(--red);}

/* TOPBAR */
.topbar{
  display:flex;align-items:center;gap:12px;padding:0 24px;
  height:var(--hh);min-height:var(--hh);
  background:rgba(255,255,255,.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-size:18px;font-weight:800;color:var(--text);flex:1;}
.topbar-sub{font-size:13px;color:var(--sub);}
.menu-btn{background:none;border:none;font-size:22px;color:var(--sub);display:none;padding:4px 8px;}

/* MAIN */
.main-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.main-area{flex:1;overflow-y:auto;padding:24px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--rc);box-shadow:var(--sc);padding:22px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--card);border-radius:var(--rc);box-shadow:var(--sc);padding:18px 20px;}
.stat-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:800;color:var(--text);}
.stat-sub{font-size:12px;color:var(--sub);margin-top:3px;}

/* CONTROLS BAR */
.ctrl-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px;}
.ctrl-bar input,.ctrl-bar select{
  padding:9px 14px;border-radius:11px;border:1.5px solid var(--border);
  background:#fff;font-size:13.5px;color:var(--text);outline:none;
  transition:border-color var(--ease);
}
.ctrl-bar input:focus,.ctrl-bar select:focus{border-color:var(--accent);}
.ctrl-bar .search-wrap{position:relative;flex:1;min-width:180px;}
.ctrl-bar .search-wrap input{width:100%;padding-left:36px;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mute);font-size:14px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:11px;border:none;font-size:13.5px;font-weight:600;transition:all var(--ease);cursor:pointer;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent-h);}
.btn-ghost{background:#f1f0fb;color:var(--accent);}
.btn-ghost:hover{background:#e4e2f7;}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{background:#e0352b;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-icon{background:var(--accent-l);border:none;border-radius:8px;padding:5px 8px;font-size:13px;color:var(--accent);cursor:pointer;transition:all var(--ease);}
.btn-icon:hover{background:var(--accent);color:#fff;}
.view-toggle{display:flex;background:#F2F2F7;border-radius:11px;padding:3px;gap:2px;}
.view-btn{padding:7px 14px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;transition:all var(--ease);}
.view-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--rc);box-shadow:var(--sc);background:#fff;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;padding:10px 14px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--sub);background:#fff;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);}
td{padding:12px 14px;border-bottom:1px solid #F2F2F7;vertical-align:middle;}
tr:nth-child(even) td{background:#FAFAFA;}
tr:nth-child(odd) td{background:#fff;}
tbody tr:hover td{background:#F5F5F7!important;transition:background 120ms ease;}
.name-cell{display:flex;align-items:center;gap:9px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.member-name{font-weight:700;font-size:13.5px;}
.member-role{font-size:11px;color:var(--mute);}
.score-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11.5px;font-weight:700;}
.s0,.s1{background:rgba(255,59,48,.1);color:#c0392b;}
.s2,.s3{background:rgba(255,159,10,.12);color:#9a5500;}
.s4,.s5{background:rgba(52,199,89,.12);color:#1e7e34;}
.dots{display:flex;gap:3px;margin-top:4px;}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-fill{background:var(--accent);}
.dot-empty{background:#E5E5EA;}
.total-ring{width:44px;height:44px;position:relative;flex-shrink:0;}
.total-ring svg{transform:rotate(-90deg);}
.total-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--text);}
.edit-cell{cursor:pointer;border-radius:8px;padding:4px 6px;transition:background var(--ease);}
.edit-cell:hover{background:#F0F0F5;}
.action-btns{display:flex;gap:6px;opacity:0;transition:opacity var(--ease);}
tr:hover .action-btns{opacity:1;}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:700;}
.badge-green{background:rgba(52,199,89,.14);color:#1e7e34;}
.badge-amber{background:rgba(255,159,10,.14);color:#9a5500;}
.badge-red{background:rgba(255,59,48,.14);color:#c0392b;}
.badge-blue{background:rgba(55,48,163,.1);color:var(--accent);}
.badge-gray{background:#F2F2F7;color:var(--sub);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#fff;border-radius:var(--rm);box-shadow:var(--sm);width:min(480px,100%);max-height:90vh;overflow-y:auto;}
.modal-lg{width:min(640px,100%);}
.modal-hd{padding:22px 24px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:17px;font-weight:800;}
.modal-close{background:none;border:none;font-size:22px;color:var(--sub);cursor:pointer;line-height:1;padding:2px 6px;}
.modal-close:hover{color:var(--red);}
.modal-bd{padding:18px 24px;}
.modal-ft{padding:0 24px 22px;display:flex;gap:10px;justify-content:flex-end;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:11px 14px;border-radius:11px;border:1.5px solid var(--border);
  background:#fff;font-size:14px;color:var(--text);outline:none;transition:border-color var(--ease);
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group textarea{resize:vertical;min-height:80px;}
.score-sel{display:flex;gap:6px;flex-wrap:wrap;}
.score-opt{width:38px;height:38px;border-radius:10px;border:2px solid var(--border);background:#fff;font-size:15px;font-weight:700;color:var(--sub);cursor:pointer;transition:all var(--ease);}
.score-opt:hover{border-color:var(--accent);color:var(--accent);}
.score-opt.sel{border-color:var(--accent);background:var(--accent);color:#fff;}

/* SECTION HEADER */
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:800;}

/* CHARTS */
canvas{display:block;}
.chart-card{background:var(--card);border-radius:var(--rc);box-shadow:var(--sc);padding:20px;margin-bottom:18px;}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* WEEKLY/MONTHLY TABLE */
.period-table{width:100%;border-collapse:collapse;font-size:13px;}
.period-table th{text-align:center;padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);border-bottom:1px solid var(--border);}
.period-table th:first-child{text-align:left;}
.period-table td{text-align:center;padding:11px 12px;border-bottom:1px solid #F2F2F7;}
.period-table td:first-child{text-align:left;font-weight:700;}
.progress-bar{height:5px;background:#F2F2F7;border-radius:3px;overflow:hidden;margin-top:4px;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}

/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #F2F2F7;}
.lb-rank{font-size:18px;width:28px;text-align:center;}
.lb-bar-wrap{flex:1;}
.lb-bar{height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent),#7c3aed);margin-top:4px;}

/* STAT PILLS */
.pills{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.pill{background:#F2F2F7;border-radius:100px;padding:7px 16px;font-size:12.5px;font-weight:600;}
.pill span{font-weight:800;color:var(--accent);}

/* COLLAPSE */
.collapse-btn{background:none;border:none;font-size:20px;color:var(--sub);cursor:pointer;padding:2px 6px;}

/* PROFILE */
.profile-section{background:var(--card);border-radius:var(--rc);box-shadow:var(--sc);padding:28px;margin-bottom:18px;}
.profile-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;margin-bottom:16px;}
.profile-name{font-size:22px;font-weight:800;margin-bottom:4px;}
.profile-role{font-size:14px;color:var(--sub);}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px;}
.profile-stat{background:#F5F5F7;border-radius:14px;padding:16px;}
.profile-stat-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.profile-stat-val{font-size:22px;font-weight:800;margin-top:4px;}

/* OVERVIEW */
.overview-card{cursor:pointer;transition:box-shadow var(--ease);}
.overview-card:hover{box-shadow:0 4px 30px rgba(0,0,0,.12);}

/* RESPONSIVE */
@media(max-width:700px){
  .sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);box-shadow:4px 0 30px rgba(0,0,0,.15);}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:block;}
  .card-grid{grid-template-columns:1fr 1fr;}
  .main-area{padding:16px;}
  .mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;display:none;}
  .mobile-overlay.show{display:block;}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card" id="login-card">
    <div class="login-logo">🌱 GrowthCircle</div>
    <div class="login-sub">Community Dashboard</div>
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>
    <!-- SIGN IN -->
    <div id="form-signin">
      <div class="field-wrap">
        <label>Username</label>
        <input type="text" id="si-user" placeholder="Enter username" autocomplete="username"/>
      </div>
      <div class="field-wrap">
        <label>Password</label>
        <input type="password" id="si-pass" placeholder="Enter password" autocomplete="current-password"/>
        <button class="eye-btn" onclick="toggleEye('si-pass',this)" type="button">👁</button>
      </div>
      <button class="login-btn" onclick="doSignIn()">Sign In</button>
      <div class="login-err" id="si-err"></div>
    </div>
    <!-- SIGN UP -->
    <div id="form-signup" style="display:none">
      <div class="field-wrap">
        <label>Username</label>
        <input type="text" id="su-user" placeholder="Choose a username"/>
      </div>
      <div class="field-wrap">
        <label>Password</label>
        <input type="password" id="su-pass" placeholder="Create password"/>
        <button class="eye-btn" onclick="toggleEye('su-pass',this)" type="button">👁</button>
      </div>
      <div class="field-wrap">
        <label>Confirm Password</label>
        <input type="password" id="su-pass2" placeholder="Confirm password"/>
        <button class="eye-btn" onclick="toggleEye('su-pass2',this)" type="button">👁</button>
      </div>
      <button class="login-btn" onclick="doSignUp()">Create Account</button>
      <div class="login-err" id="su-err"></div>
    </div>
  </div>
</div>

<!-- MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobile-overlay" onclick="closeSidebar()"></div>

<!-- APP SCREEN -->
<div id="app-screen" class="hidden">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">🌱 GrowthCircle</div>
      <div class="sidebar-logo-sub">Community Dashboard</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Main</div>
      <button class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard"><span class="icon">📊</span>Dashboard</button>
      <button class="nav-item" onclick="navigate('overview')" id="nav-overview"><span class="icon">🏆</span>Leaderboard</button>
      <button class="nav-item" onclick="navigate('profile')" id="nav-profile"><span class="icon">👤</span>My Profile</button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="sidebar-avatar" style="background:#3730a3;font-size:13px;"></div>
        <div>
          <div class="name" id="sidebar-name"></div>
          <div class="role" id="sidebar-role"></div>
        </div>
        <button class="logout-btn" onclick="doLogout()" title="Logout">⏻</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-wrap">
    <div class="topbar">
      <button class="menu-btn" onclick="openSidebar()">☰</button>
      <div style="flex:1">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub"></div>
      </div>
      <div id="topbar-actions"></div>
    </div>
    <div class="main-area" id="main-area">
      <!-- content injected here -->
    </div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
/* ===================== DATA STORE ===================== */
const ADMIN = {username:'Growthcircle', password:'growthnazal100', role:'admin'};
const KEY = 'gc_data_v2';
const SESSION_KEY = 'gc_session';

const COLORS = ['#3730a3','#0891b2','#7c3aed','#db2777','#ea580c','#16a34a','#dc2626','#2563eb'];
function avatarColor(name){ let h=0;for(let c of name)h=(h<<5)-h+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length]; }
function initials(name){ return name.trim().split(' ').map(w=>w[0]?.toUpperCase()||'').slice(0,2).join(''); }

function seedData(){
  const names = ['Aisha Rahman','Marcus Johnson','Priya Patel','Thomas Wright','Lena Fischer','Carlos Mendez'];
  const members = names.map((name,i)=>({id:'m'+i, name}));
  const records = {};
  const today = new Date();
  for(let d=0;d<10;d++){
    const dt = new Date(today); dt.setDate(dt.getDate()-d);
    const key = dt.toISOString().slice(0,10);
    members.forEach(m=>{
      records[m.id+'_'+key] = {
        taskScore: Math.floor(Math.random()*4)+2,
        taskText: ['Completed module','Submitted report','Joined session','Finished exercises','Read article'][Math.floor(Math.random()*5)],
        engagement: Math.floor(Math.random()*3)+3,
        attendance: Math.floor(Math.random()*3)+3,
        growth: Math.floor(Math.random()*3)+2,
        habit: Math.random()>.3?'On track':'Needs work',
        screenTime: +(Math.random()*4+0.5).toFixed(1),
        attLevel: Math.floor(Math.random()*4)+2,
      };
    });
  }
  return {members, records, accounts:[]};
}

function loadData(){
  try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); } catch{}
  const d=seedData(); saveData(d); return d;
}
function saveData(d){ try{ localStorage.setItem(KEY,JSON.stringify(d)); }catch{} }

let DB = loadData();

try{ const s=sessionStorage.getItem(SESSION_KEY); if(s) currentUser=JSON.parse(s); }catch{}

function saveSession(u){ try{ sessionStorage.setItem(SESSION_KEY,JSON.stringify(u)); }catch{} }
function clearSession(){ try{ sessionStorage.removeItem(SESSION_KEY); }catch{} }

/* ===================== HELPERS ===================== */
function today(){ return new Date().toISOString().slice(0,10); }
function recKey(mid,date){ return mid+'_'+date; }
function getRec(mid,date){ return DB.records[recKey(mid,date)]||{taskScore:0,taskText:'',engagement:0,attendance:0,growth:0,habit:'',screenTime:0,attLevel:0}; }
function setRec(mid,date,data){ DB.records[recKey(mid,date)]={...getRec(mid,date),...data}; saveData(DB); }
function dailyTotal(r){ return (r.taskScore||0)+(r.engagement||0)+(r.attendance||0)+(r.growth||0); }
function attLabel(l){ return ['','Absent','Very Late','Late','On Time','Active','Champion'][l]||''; }
function scoreColorClass(s){ if(s<=1) return 's0'; if(s<=3) return 's2'; return 's4'; }

function makeAvatar(name,size=34){
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.38)}px;background:${avatarColor(name)}">${initials(name)}</div>`;
}

function makeDots(score,max=5){
  let h='<div class="dots">';
  for(let i=1;i<=max;i++) h+=`<div class="dot ${i<=score?'dot-fill':'dot-empty'}"></div>`;
  return h+'</div>';
}

function makeRing(total,max=20){
  const pct = Math.min(total/max,1);
  const r=16, cx=22, cy=22, circ=2*Math.PI*r;
  const dash=pct*circ, gap=circ-dash;
  const color = total>=16?'#34C759':total>=10?'#FF9F0A':'#3730a3';
  return `<div class="total-ring">
    <svg width="44" height="44" viewBox="0 0 44 44">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F2F2F7" stroke-width="3"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${dash} ${gap}" stroke-linecap="round"/>
    </svg>
    <div class="total-num">${total}</div>
  </div>`;
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

function getLast7Days(){
  const days=[]; const t=new Date();
  for(let i=6;i>=0;i--){ const d=new Date(t);d.setDate(d.getDate()-i);days.push(d.toISOString().slice(0,10)); }
  return days;
}

function getWeekDays(dateStr){
  const d=new Date(dateStr); const dow=d.getDay();
  const mon=new Date(d); mon.setDate(d.getDate()-(dow===0?6:dow-1));
  const days=[];
  for(let i=0;i<7;i++){ const x=new Date(mon);x.setDate(mon.getDate()+i);days.push(x.toISOString().slice(0,10)); }
  return days;
}

function getMonthDays(dateStr){
  const d=new Date(dateStr); const y=d.getFullYear(),m=d.getMonth();
  const days=[]; const t=new Date(y,m+1,0).getDate();
  for(let i=1;i<=t;i++) days.push(`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`);
  return days;
}

function doSignIn(){
  const u=document.getElementById('si-user').value.trim();
  const p=document.getElementById('si-pass').value;
  const err=document.getElementById('si-err');
  err.textContent='';
  if(!u||!p){err.textContent='Please fill in all fields.';return;}
  // Check admin

    loginUser({username:u,role:'admin'});return;
  }
  // Check registered accounts
  const acc=DB.accounts.find(a=>a.username===u && a.password===p);
  if(acc){loginUser({username:u,role:'member'});return;}
  // Default member
  if(u==='member' && p==='view123'){loginUser({username:'member',role:'member'});return;}
  shakeCard();
  err.textContent='Incorrect username or password.';
}

function doSignUp(){
  const u=document.getElementById('su-user').value.trim();
  const p=document.getElementById('su-pass').value;
  const p2=document.getElementById('su-pass2').value;
  const err=document.getElementById('su-err');
  err.textContent='';
  if(!u||!p||!p2){err.textContent='Please fill in all fields.';return;}

  if(u===ADMIN.username){err.textContent='That username is reserved.';return;}
  if(DB.accounts.find(a=>a.username===u)){err.textContent='Username already taken.';return;}
  DB.accounts.push({username:u,password:p,role:'member'});

}

}

function renderWeeklyTable(isAdmin){
  const days=getWeekDays(currentDate);
  const labels=days.map(d=>new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short'}));
  const members=filteredMembers();

  let html=`<div class="table-wrap"><table class="period-table"><thead><tr><th>Member</th>`;
  labels.forEach(l=>{ html+=`<th>${l}</th>`; });
  html+=`<th>Total</th><th>%</th></tr></thead><tbody>`;

  members.forEach(m=>{
    let weekTotal=0;
    let dayTotals=days.map(d=>{ const r=getRec(m.id,d); const t=dailyTotal(r); weekTotal+=t; return t; });
    const pct=Math.round(weekTotal/140*100);
    html+=`<tr><td><div class="name-cell">${makeAvatar(m.name)}<span style="margin-left:8px;font-weight:700">${esc(m.name)}</span></div></td>`;
    dayTotals.forEach(t=>{ html+=`<td><span class="score-badge ${t>=16?'s4':t>=10?'s2':'s0'}">${t}</span></td>`; });

      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

  });
  html+=`</tbody></table></div>`;
  return html;
}

function renderMonthlyTable(isAdmin){
  const days=getMonthDays(currentDate);
  const members=filteredMembers();
  const max=days.length*20;

  let html=`<div class="table-wrap"><table class="period-table"><thead><tr><th>Member</th><th>Total Score</th><th>Avg/Day</th><th>% of Max</th></tr></thead><tbody>`;
  members.forEach(m=>{
    let tot=0;
    days.forEach(d=>{ const r=getRec(m.id,d); tot+=dailyTotal(r); });
    const avg=Math.round(tot/days.length*10)/10;
    const pct=Math.round(tot/max*100);
    html+=`<tr>
      <td><div class="name-cell">${makeAvatar(m.name)}<span style="margin-left:8px;font-weight:700">${esc(m.name)}</span></div></td>
      <td><strong>${tot}</strong></td>

      <td><div>${pct}%</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></td>

  return html;

/* ===================== LEADERBOARD ===================== */
function renderLeaderboard(container){
  const days=getLast7Days();
  const stats=DB.members.map(m=>{
    let wt=0; days.forEach(d=>{ const r=getRec(m.id,d); wt+=dailyTotal(r); });
    return {m,wt};
  }).sort((a,b)=>b.wt-a.wt);

  const maxWt=stats[0]?.wt||1;
  const medals=['🥇','🥈','🥉'];

  let html=`<div class="card">
    <div class="section-hd"><div class="section-title">🏆 Weekly Leaderboard</div><div style="font-size:12px;color:var(--sub)">Last 7 days · Max 140pts</div></div>`;

  stats.forEach(({m,wt},i)=>{
    const pct=Math.round(wt/maxWt*100);
    html+=`<div class="lb-item">
      <div class="lb-rank">${medals[i]||`<span style="font-size:14px;font-weight:700;color:var(--sub)">${i+1}</span>`}</div>
      ${makeAvatar(m.name,38)}
      <div class="lb-bar-wrap">
        <div style="font-weight:700;font-size:14px">${esc(m.name)}</div>
        <div class="lb-bar" style="width:${pct}%;background:${i===0?'linear-gradient(90deg,#f59e0b,#fbbf24)':'linear-gradient(90deg,#3730a3,#7c3aed)'}"></div>
      </div>
      <div style="font-weight:800;font-size:18px;color:var(--accent)">${wt}</div>
    </div>`;
  });

  html+=`</div>`;
  container.innerHTML=html;
}

    <div id="cp-msg" style="margin-bottom:10px;font-size:13px;"></div>

function changePassword(){
  const old=document.getElementById('cp-old').value;
  const nw=document.getElementById('cp-new').value;
  const nw2=document.getElementById('cp-new2').value;
  const msg=document.getElementById('cp-msg');
  if(!old||!nw||!nw2){msg.style.color='var(--red)';msg.textContent='Please fill all fields.';return;}
  if(nw!==nw2){msg.style.color='var(--red)';msg.textContent='New passwords do not match.';return;}
  const acc=DB.accounts.find(a=>a.username===currentUser.username);
  if(acc){
    if(acc.password!==old){msg.style.color='var(--red)';msg.textContent='Current password is incorrect.';return;}
    acc.password=nw;saveData(DB);
    msg.style.color='var(--green)';msg.textContent='✅ Password updated successfully!';
  } else {
    msg.style.color='var(--red)';msg.textContent='Cannot change password for this account.';
  }
}

  const body=`

      <div class="pill">Avg Engagement <span>${avgEng}/5</span></div>
      <div class="pill">Avg Screen Time <span>${avgSt}h</span></div>
    </div>
    <div class="chart-card">

      <canvas id="g-bar" height="120"></canvas>
      <div class="legend">
        ${labels.map((l,i)=>`<div class="legend-item"><div class="legend-dot" style="background:${totals[i]>=16?'#34C759':totals[i]>=10?'#FF9F0A':'#3730a3'}"></div>${l}: ${totals[i]}</div>`).join('')}
      </div>
    </div>

      <div class="chart-title">📈 Engagement Trend</div>
      <canvas id="g-line" height="100"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">⏱️ Screen Time (hrs)</div>
      <canvas id="g-screen" height="100"></canvas>
    </div>`;

  showModal(modalWrap(`📊 ${esc(m.name)} – Weekly Report`,body,`<button class="btn btn-primary" onclick="closeModal()">Close</button>`,'lg'));

  setTimeout(()=>{

/* ===================== CANVAS CHARTS ===================== */
function setupCanvas(id){
  const canvas=document.getElementById(id);
  if(!canvas)return null;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||canvas.parentElement?.offsetWidth||400;
  const H=canvas.offsetHeight||160;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  return{ctx,W,H};
}

function drawBar(id,labels,values,maxVal){
  const r=setupCanvas(id);if(!r)return;
  const{ctx,W,H}=r;
  const pL=8,pR=8,pT=22,pB=26;
  const cW=W-pL-pR,cH=H-pT-pB;
  const n=labels.length,gap=cW/n,bW=gap*.62;
  values.forEach((v,i)=>{
    const x=pL+i*gap+(gap-bW)/2;
    const bH=Math.max(1,(v/maxVal)*cH);
    const y=pT+cH-bH;
    const color=v>=16?'#34C759':v>=10?'#FF9F0A':'#3730a3';
    ctx.fillStyle=color;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,bW,bH,[4,4,0,0]);
    else ctx.rect(x,y,bW,bH);
    ctx.fill();
    ctx.fillStyle='#1d1d1f';ctx.font='bold 10px Inter,-apple-system';ctx.textAlign='center';
    ctx.fillText(v,x+bW/2,y-4);
    ctx.fillStyle='#aeaeb2';ctx.font='10px Inter,-apple-system';
    ctx.fillText(labels[i],x+bW/2,pT+cH+16);
  });
}

function drawLine(id,labels,values,maxVal,color){
  const r=setupCanvas(id);if(!r)return;
  const{ctx,W,H}=r;
  const pL=28,pR=16,pT=22,pB=26;
  const cW=W-pL-pR,cH=H-pT-pB;
  const n=values.length;
  if(n<2)return;
  const gx=i=>pL+(i/(n-1))*cW;
  const gy=v=>pT+cH-(Math.min(v,maxVal)/maxVal)*cH;
  ctx.strokeStyle='#F2F2F7';ctx.lineWidth=1;
  [0,.25,.5,.75,1].forEach(t=>{const y=pT+cH-t*cH;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(pL+cW,y);ctx.stroke();});
  const grad=ctx.createLinearGradient(0,pT,0,pT+cH);
  grad.addColorStop(0,color+'33');grad.addColorStop(1,color+'00');
  ctx.beginPath();ctx.moveTo(gx(0),gy(values[0]));
  values.forEach((_,i)=>{if(i>0)ctx.lineTo(gx(i),gy(values[i]));});
  ctx.lineTo(gx(n-1),pT+cH);ctx.lineTo(gx(0),pT+cH);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.moveTo(gx(0),gy(values[0]));
  values.forEach((_,i)=>{if(i>0)ctx.lineTo(gx(i),gy(values[i]));});
  ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
  values.forEach((v,i)=>{
    ctx.beginPath();ctx.arc(gx(i),gy(v),3.5,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#aeaeb2';ctx.font='9.5px Inter,-apple-system';ctx.textAlign='center';
    ctx.fillText(labels[i],gx(i),pT+cH+16);
  });
}
